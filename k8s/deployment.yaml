apiVersion: apps/v1
kind: Deployment
metadata:
  name: "pepsi"
  namespace: "agents-cola"
  labels:
    app: "pepsi"
    team: "cola"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: "pepsi"
  template:
    metadata:
      labels:
        app: "pepsi"
        team: "cola"
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: "sa-pepsi"
      containers:
        - name: "pepsi"
          image: "acrshoppoc.azurecr.io/agents/pepsi:latest"
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: "config-pepsi"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
