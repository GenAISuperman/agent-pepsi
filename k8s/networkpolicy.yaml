# Deny all ingress and egress by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "deny-all-pepsi"
  namespace: "agents-cola"
spec:
  podSelector:
    matchLabels:
      app: "pepsi"
  policyTypes:
    - Ingress
    - Egress
---
# Allow platform traffic only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: "allow-platform-pepsi"
  namespace: "agents-cola"
spec:
  podSelector:
    matchLabels:
      app: "pepsi"
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: apim
  egress:
    # HTTPS — APIM (tool calls + registry), Key Vault, ACR, Azure OpenAI
    - to: []
      ports:
        - protocol: TCP
          port: 443
    # DNS — required for name resolution
    - to: []
      ports:
        - protocol: UDP
          port: 53
